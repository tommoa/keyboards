# ConnectPro UDP-12AP HID topology: keyboard on HID_0 and consumer/media
# controls on HID_1, giving the KVM a dedicated boot-keyboard interface.
# zmkfirmware/zmk#3339 tracks the upstream need; these settings use the
# tommoa/zmk usb-hid-device-indexes branch from feral/connectpro/west.yml.
CONFIG_USB_HID_DEVICE_COUNT=2
CONFIG_ZMK_USB_KEYBOARD_HID_DEVICE_INDEX=0
CONFIG_ZMK_USB_CONSUMER_HID_DEVICE_INDEX=1
