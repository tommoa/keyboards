# ConnectPro UDP-12AP HID topology: keyboard on HID_0 and consumer/media
# controls on HID_1, giving the KVM a dedicated boot-keyboard interface.
# The local ZMK patch keeps stock behavior by default; these role-device
# settings opt this build into split keyboard/consumer HID interfaces.
CONFIG_USB_HID_DEVICE_COUNT=2
CONFIG_ZMK_USB_KEYBOARD_HID_DEVICE="HID_0"
CONFIG_ZMK_USB_CONSUMER_HID_DEVICE="HID_1"
