# Enable USB HID output from the left central half; this is the primary
# connection path through the ConnectPro KVM.
CONFIG_ZMK_USB=y

# Keep BLE enabled for host profiles and for split central/peripheral traffic.
CONFIG_ZMK_BLE=y

# Allow four host BLE profiles plus the right split peripheral connection.
# ZMK recommends matching BT_MAX_CONN and BT_MAX_PAIRED on split centrals.
CONFIG_BT_MAX_CONN=5

# Match BT_MAX_CONN so stored bonds cover the same four hosts plus peripheral.
CONFIG_BT_MAX_PAIRED=5

# Expose USB boot protocol support for simpler HID parsers such as KVM DDM
# keyboard ports, firmware prompts, and pre-OS environments.
CONFIG_ZMK_USB_BOOT=y

# Explicitly enable Zephyr's HID boot protocol support so the USB interface is
# advertised as a boot-capable keyboard, matching what KVM DDM parsers expect.
CONFIG_USB_HID_BOOT_PROTOCOL=y

# Use fixed-size keyboard rollover reports instead of NKRO bitmap reports;
# the ConnectPro DDM path is more likely to understand standard HID reports.
CONFIG_ZMK_HID_REPORT_TYPE_HKRO=y

# Limit HKRO to standard 6KRO: six non-modifier keys plus modifiers.
CONFIG_ZMK_HID_KEYBOARD_REPORT_SIZE=6

# Disable CDC ACM serial backends so the USB device presents only keyboard HID
# functionality to hosts and the KVM.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n

# Keep the USB CDC ACM class disabled; logs are not needed in normal firmware
# and extra USB interfaces can confuse KVM DDM device mapping.
CONFIG_USB_CDC_ACM=n

# Disable UART console because Feral uses the XIAO UART pins for the matrix.
CONFIG_UART_CONSOLE=n

# Disable console logging in normal firmware to avoid unused logging backends.
CONFIG_CONSOLE=n

# Enable the custom startup/status LED behavior shipped in feral/startup-led.
CONFIG_FERAL_RGBLED_STATUS=y
